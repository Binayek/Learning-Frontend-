<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>3rd Lab 1</title>
    </head>
    <p>Radius=<input type="text" id="radius"></p>
    <p id="area"></p>
    <script>
        document.getElementById("radius").addEventListener("input", function() {
            let radius = parseFloat(this.value);
            if (!isNaN(radius)) {
                let area = Math.PI * radius * radius;
                document.getElementById("area").innerText = "Area: " + area.toFixed(2);
            } else {
                document.getElementById("area").innerText = "Please enter a valid number";
            }
        });
    </script>
</html>
