<!DOCTYPE html>
<html>
    <head>
        <title>Promise Example</title>
    </head>
    <body>
        <h2> Promise Example</h2>
        <button onclick="login()">Login</button>
        <p id="output"></p>
        <script>
            function checklogin({
                return new Promise(resolve,reject)=>{
                    setTimeout()=>{
                        const success=true;
                        if (success){
                            resolve("Login succesful");
                        } else{
                            resolve("Login failed");
                        }
                    },2000};
                });
            
                function login(){
                    document.getElementById("output").innerText="Checking...";

                    checklogin()
                    .then(message=>{
                        document.getElementById("output").innerText=message;
                    });
                    .catch(error =>{
                        document.getElementById("output").innerText= error;
                    });
                }
        </script>
    </body>
</html>
